<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五一快乐</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fbff 0%, #fff3d9 48%, #e9fff4 100%);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      overflow: hidden;
    }

    main {
      width: min(86vw, 760px);
      display: grid;
      gap: 28px;
      justify-items: center;
    }

    img {
      width: min(76vw, 560px);
      height: auto;
      display: block;
      filter: drop-shadow(0 22px 34px rgba(17, 138, 178, 0.18));
      animation: pictureFloat 3.2s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      color: #e84a5f;
      font-size: clamp(3rem, 12vw, 8rem);
      letter-spacing: 0;
      text-shadow:
        0 4px 0 #ffd166,
        0 14px 30px rgba(232, 74, 95, 0.25);
      animation: float 2.4s ease-in-out infinite, glow 1.8s ease-in-out infinite alternate;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-18px) scale(1.04);
      }
    }

    @keyframes pictureFloat {
      0%, 100% {
        transform: translateY(0) rotate(-1deg);
      }

      50% {
        transform: translateY(12px) rotate(1deg);
      }
    }

    @keyframes glow {
      from {
        text-shadow:
          0 4px 0 #ffd166,
          0 14px 30px rgba(232, 74, 95, 0.25);
      }

      to {
        text-shadow:
          0 4px 0 #06d6a0,
          0 18px 44px rgba(6, 214, 160, 0.38);
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="may-day.svg" alt="五一快乐节日插画">
    <h1>五一快乐</h1>
  </main>
</body>
</html>
